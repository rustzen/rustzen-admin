name: Backend Build

on:
    workflow_dispatch:

jobs:
    build:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout
              uses: actions/checkout@v6

            - name: Build binary
              run: docker buildx build --platform linux/amd64 --build-arg PACKAGE_NAME=server --build-arg TARGET_TRIPLE=x86_64-unknown-linux-musl --target export --output type=local,dest=target/rustzen-admin .

            - name: Upload artifact
              uses: actions/upload-artifact@v4
              with:
                  name: rustzen-admin-binary
                  path: target/rustzen-admin/rustzen-admin-*
                  retention-days: 30
