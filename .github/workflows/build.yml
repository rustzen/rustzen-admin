name: Rustzen Admin Build

on:
    workflow_dispatch:

jobs:
    build:
        runs-on: ubuntu-latest
        env:
            NODE_VERSION: "24.2.0"

        steps:
            - name: Checkout
              uses: actions/checkout@v6

            - name: Setup just
              uses: extractions/setup-just@v3

            - name: Setup pnpm
              uses: pnpm/action-setup@v6
              with:
                  version: 11.2.2
                  cache: true
                  cache_dependency_path: apps/web/pnpm-lock.yaml

            - name: Setup Node.js
              uses: actions/setup-node@v6
              with:
                  node-version: ${{ env.NODE_VERSION }}

            - name: Install frontend dependencies
              run: pnpm install --frozen-lockfile
              working-directory: apps/web

            - name: Build release artifacts
              run: just build

            - name: Read package version
              id: package-version
              run: echo "version=$(awk -F '"' '/^version = / { print $2; exit }' apps/server/Cargo.toml)" >> "$GITHUB_OUTPUT"

            - name: Upload artifact
              uses: actions/upload-artifact@v4
              with:
                  name: rustzen-admin-${{ steps.package-version.outputs.version }}
                  path: target/rustzen-admin/*
