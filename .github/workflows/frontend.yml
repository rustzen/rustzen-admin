name: Frontend Build

on:
    workflow_dispatch:

env:
    NODE_VERSION: "24.2.0"

jobs:
    build:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout
              uses: actions/checkout@v6

            - name: Setup Node.js
              uses: actions/setup-node@v6
              with:
                  node-version: ${{ env.NODE_VERSION }}
                  cache: pnpm
                  cache-dependency-path: zen-web/pnpm-lock.yaml

            - name: Enable pnpm
              run: |
                  corepack enable
                  corepack prepare pnpm@10.32.1 --activate

            - name: Install dependencies
              run: pnpm install --frozen-lockfile
              working-directory: zen-web

            - name: Build frontend
              run: pnpm build
              working-directory: zen-web

            - name: Upload artifact
              uses: actions/upload-artifact@v4
              with:
                  name: frontend-dist
                  path: zen-web/dist/
                  retention-days: 30
