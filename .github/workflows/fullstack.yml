name: Full Stack Build

on:
    workflow_dispatch:

jobs:
    build:
        runs-on: ubuntu-latest
        env:
            NODE_VERSION: "24.2.0"

        steps:
            - name: Checkout
              uses: actions/checkout@v6

            - name: Build server binary
              run: docker buildx build --platform linux/amd64 --build-arg PACKAGE_NAME=server --build-arg TARGET_TRIPLE=x86_64-unknown-linux-musl --target export --output type=local,dest=target/rustzen-admin .

            - name: Setup Node.js
              uses: actions/setup-node@v6
              with:
                  node-version: ${{ env.NODE_VERSION }}
                  cache: pnpm
                  cache-dependency-path: apps/web/pnpm-lock.yaml

            - name: Enable pnpm
              run: |
                  corepack enable
                  corepack prepare pnpm@11.2.2 --activate

            - name: Build web zip
              run: |
                  pnpm install --frozen-lockfile
                  pnpm build
                  VERSION=$(awk -F '"' '/^version = / { print $2; exit }' ../../apps/server/Cargo.toml)
                  mkdir -p ../../target/rustzen-admin
                  mv dist-rustzen-admin-*.zip ../../target/rustzen-admin/dist-$VERSION.zip
              working-directory: apps/web

            - name: Upload artifact
              uses: actions/upload-artifact@v4
              with:
                  name: rustzen-admin-build
                  path: target/rustzen-admin/*
