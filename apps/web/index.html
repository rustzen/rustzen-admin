<!doctype html>
<html lang="zh-CN">
    <head>
        <meta charset="UTF-8" />
        <link rel="icon" type="image/svg+xml" href="/rustzen.png" />
        <script>
            try {
                const theme = localStorage.getItem("rustzen-admin-theme");
                document.documentElement.classList.toggle("dark", theme === "dark");
                if (theme !== "light" && theme !== "dark") {
                    localStorage.setItem("rustzen-admin-theme", "light");
                }
                document.documentElement.lang =
                    localStorage.getItem("rustzen-admin-locale") === "en-US" ? "en-US" : "zh-CN";
            } catch {}
        </script>
        <link href="/src/style.css" rel="stylesheet" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Rustzen Admin</title>
    </head>
    <body>
        <div id="root"></div>
        <script type="module" src="/src/main.tsx"></script>
    </body>
</html>
