version: 2
revision: 4
visual_source:
  id: rustzen-admin-solid-surface-baseline
  revision: 1
  status: accepted
  source: apps/web/src/styles/theme.css
  rights_status: project-owned
  use:
    - semantic-light-dark-color-system
    - compact-solid-surface-treatment
    - restrained-radius-and-shadow
    - application-shell-density
  ignore:
    - historical-glass-theme
    - historical-ambient-background
    - speculative-business-content
    - unverified-metrics
product:
  name: rustzen-admin
  type: operations-console
  platform: web
  audience:
    - system-administrators
    - developers
  primary_job: Inspect system state and complete configuration or operational actions with traceable context.
principles:
  - operational-facts-first
  - compact-but-readable
  - action-near-context
  - status-colors-are-semantic
  - preserve-module-boundaries
layout:
  shell: compact-sidebar-ledger
  content_owner: application-layout
  scroll_owner: route-content
  target_sizes:
    - 1920x1080
    - 1440x900
surface:
  themes:
    - light
    - dark
  default_theme: light
  material: solid-semantic-surfaces
typography:
  display: inter-system
  body: inter-system
  utility: ui-monospace
density: compact-readable
preferred_patterns:
  - single-page-container
  - page-header-or-page-card-title
  - status-ledger
  - filter-toolbar
  - compact-table
  - detail-drawer
  - timeline
  - single-primary-chart
restricted_patterns:
  - repeated-kpi-cards
  - nested-dashboard
  - oversized-hero
  - neon-gradient
  - decorative-glass
  - ambient-background-image
  - strong-card-shadow
  - marketing-login-hero
required_states:
  - loading
  - empty
  - error
  - populated
  - permission-denied
implementation:
  preserve_routes: true
  preserve_data_contracts: true
  preserve_component_system: true
  invented_capabilities: prohibited
avoid:
  - duplicated-page-title
  - mixed-chinese-english-copy
  - placeholder-only-accessible-name
  - card-inside-card
  - dashboard-fill-metrics
  - horizontal-overflow
  - frontend-business-authority
