version: 2
revision: 6
visual_source:
  id: figure-2-web-console
  revision: 2
  status: accepted
  source: docs/ui/reference-assets/figure-2-light-glass-dashboard.png
  rights_status: reference-only
  use:
    - page-density
    - navigation-proportion
    - hierarchy
    - powder-blue-and-coral-ambient-light
    - translucent-three-column-shell
  ignore:
    - exact-brand
    - exact-business-content
    - unverified-metrics
    - unverified-navigation
task:
  id: application-ui-standardization
  project: rustzen-admin
  surface: all-web-routes-and-shared-page-components
  goal: Unify the 20 current routes around one layout, surface, component, state, language, and three-theme standard.
scope:
  include:
    - application-shell
    - login-and-route-status-pages
    - dashboard-and-profile
    - monitoring-pages
    - analytics-pages
    - reports-pages
    - system-pages
    - manage-pages
    - shared-page-table-feedback-components
    - global-tokens
    - responsive-layout
  exclude:
    - backend-api-changes
    - permission-contract-changes
    - route-renames
    - new-analytics
facts:
  available:
    - twenty-existing-routes
    - colorful-glass-white-dark-themes
    - dashboard-stats
    - module-health
    - system-health
    - observed-metrics
    - observed-trends
  unavailable:
    - prediction
    - confidence-score
    - recommended-remediation
references:
  - figure-2-web-console
required_states:
  - loading
  - empty
  - error
  - populated
  - permission-denied
validation:
  target_sizes:
    - 1920x1080
    - 1440x900
  deterministic:
    - web-lint
    - web-typecheck
    - web-build
    - all-routes-browser-review
    - three-theme-homepage-review
    - no-horizontal-overflow
    - no-console-errors
acceptance:
  - one-primary-operational-focus
  - no-invented-metrics
  - no-nested-dashboard
  - current-routes-use-existing-permission-contracts
budget:
  max_variants: 3
  max_generation_rounds: 2
  max_runtime_runs: 8
  max_duration_minutes: 120
  max_cost_usd: 3
  max_artifact_storage_mb: 200
recovery:
  preserve_last_accepted_revision: true
  allow_resume: true
  allow_rollback: true
