version: 2
revision: 5
visual_source:
  id: rustzen-admin-solid-surface-baseline
  revision: 1
  status: accepted
  source: apps/web/src/styles/theme.css
  rights_status: project-owned
  use:
    - semantic-light-dark-color-system
    - compact-solid-surface-treatment
    - restrained-radius-and-shadow
    - application-shell-density
  ignore:
    - historical-glass-theme
    - historical-ambient-background
    - speculative-business-content
    - unverified-metrics
task:
  id: application-ui-standardization
  project: rustzen-admin
  surface: all-web-routes-and-shared-page-components
  goal: Converge all Web routes on a restrained, compact Admin visual language with only standard light and dark themes, without changing business contracts.
scope:
  include:
    - application-shell
    - login-and-route-status-pages
    - dashboard-and-profile
    - monitoring-pages
    - analytics-pages
    - reports-pages
    - system-pages
    - manage-pages
    - shared-page-table-feedback-components
    - global-tokens
    - responsive-layout
  exclude:
    - backend-api-changes
    - permission-contract-changes
    - route-renames
    - new-analytics
facts:
  available:
    - twenty-existing-routes
    - standard-light-dark-themes-with-legacy-storage-fallback
    - dashboard-stats
    - module-health
    - system-health
    - observed-metrics
    - observed-trends
  unavailable:
    - prediction
    - confidence-score
    - recommended-remediation
references:
  - rustzen-admin-solid-surface-baseline
  - rustzen-admin-product-foundation
required_states:
  - loading
  - empty
  - error
  - populated
  - permission-denied
validation:
  target_sizes:
    - 1920x1080
    - 1440x900
  deterministic:
    - web-lint
    - web-typecheck
    - web-build
    - all-routes-browser-review
    - light-dark-core-surface-review
    - legacy-theme-storage-fallback
    - no-horizontal-overflow
    - no-console-errors
acceptance:
  - one-primary-operational-focus
  - no-invented-metrics
  - no-nested-dashboard
  - route-and-permission-contracts-preserved
budget:
  max_variants: 1
  max_generation_rounds: 0
  max_runtime_runs: 8
  max_duration_minutes: 120
  max_cost_usd: 3
  max_artifact_storage_mb: 200
recovery:
  preserve_last_accepted_revision: true
  allow_resume: true
  allow_rollback: true
